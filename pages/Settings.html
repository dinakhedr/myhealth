<!DOCTYPE html>
<html lang="en">
<head>
  <script>
  // Apply cached theme instantly to prevent flash of default colors
  (function() {
    const cache = localStorage.getItem('theme_cache');
    if (cache) {
      try {
        const theme = JSON.parse(cache);
        const root = document.documentElement;
        Object.entries(theme.colors).forEach(([k, v]) => root.style.setProperty(`--${k}`, v));
        Object.entries(theme.fonts).forEach(([k, v]) => root.style.setProperty(`--${k}`, v));
      } catch(e) {}
    }
  })();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Settings · Health Tracker</title>
  <link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="../images/icon.png">
<link rel="icon" type="image/png" sizes="180x180" href="../images/icon.png">
<link rel="shortcut icon" href="../images/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/config.js"></script>
  <script src="../assets/utils.js"></script>
  <script src="../assets/auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <style>
    .section-title {
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin: 20px 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title:first-of-type {
      margin-top: 0;
    }
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .theme-card {
      background: var(--surface-2);
      border-radius: var(--radius-md);
      padding: 12px 10px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-align: center;
    }
    .theme-card.selected {
      border-color: var(--brand);
      background: rgba(var(--shadow-color), 0.05);
    }
    .color-preview {
      width: 100%;
      height: 50px;
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .font-preview {
      width: 100%;
      height: 50px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }
    .theme-card .name {
      font-weight: 700;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 2px;
    }
    .check-mark {
      color: var(--brand);
      font-size: 14px;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .theme-card.selected .check-mark {
      opacity: 1;
    }
    .container {
      padding-bottom: 20px;
    }
    @media (min-width: 400px) {
      .theme-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box"><div class="spinner"></div><p>Loading…</p></div>
</div>

<div class="container">
  <div class="header">
    <div class="header-left">
      <button class="back-btn" onclick="window.location.href='Home.html'">←</button>
      <h1>⚙️ Settings</h1>
    </div>
    <div class="header-actions">
      <button class="hdr-icon-btn danger" onclick="logout()">⏻</button>
    </div>
  </div>

  <div class="card" style="padding: 18px;">
    <div class="section-title">
      <span>🎨 Color Theme</span>
    </div>
    <div id="colorThemeGrid" class="theme-grid"></div>

    <div class="section-title">
      <span>✏️ Font Style</span>
    </div>
    <div id="fontThemeGrid" class="theme-grid"></div>
  </div>

  <p style="color:var(--text-3); font-size:11px; text-align:center; margin-top:12px;">
    Themes loaded from AppThemes
  </p>
</div>

<div id="bottomNavMount"></div>
<div class="toast" id="toast"></div>

<script>
let currentUserEmail = null;
let spreadsheetId = null;
let colorThemes = [];
let fontThemes = [];

async function loadThemesData() {
  try {
    colorThemes = await fetchColorThemes();
    fontThemes = await fetchFontThemes();
  } catch (e) {
    console.error('Failed to load themes', e);
    showToast('Could not load themes', 'error');
  }
}

function renderColorGrid() {
  const container = document.getElementById('colorThemeGrid');
  const currentColorTheme = localStorage.getItem('selected_color_theme') || 'Ocean Calm';
  
  container.innerHTML = colorThemes.map(theme => {
    const colors = theme.colors;
    const gradient = `linear-gradient(135deg, ${colors.brand || '#ccc'} 0%, ${colors['brand-2'] || '#999'} 100%)`;
    const isSelected = theme.name === currentColorTheme;
    
    return `
      <div class="theme-card ${isSelected ? 'selected' : ''}" onclick="selectColorTheme('${theme.name}')">
        <div class="color-preview" style="background: ${gradient};"></div>
        <div class="name">${theme.name}</div>
        <div class="check-mark">✓</div>
      </div>
    `;
  }).join('');
}

function renderFontGrid() {
  const container = document.getElementById('fontThemeGrid');
  const currentFontTheme = localStorage.getItem('selected_font_theme') || 'Default';
  
  container.innerHTML = fontThemes.map(theme => {
    const fonts = theme.fonts;
    const isSelected = theme.name === currentFontTheme;
    
    return `
      <div class="theme-card ${isSelected ? 'selected' : ''}" onclick="selectFontTheme('${theme.name}')">
        <div class="font-preview">
          <span style="font-family: ${fonts['family-heading'] || 'Sora'}; font-weight: ${fonts['weight-heading'] || '800'}; font-size: 18px; color: var(--text);">Aa</span>
        </div>
        <div class="name">${theme.name}</div>
        <div class="check-mark">✓</div>
      </div>
    `;
  }).join('');
}

function selectColorTheme(name) {
  applyColorTheme(name, colorThemes, fontThemes);
  renderColorGrid();
  showToast(`🎨 ${name}`);
}

function selectFontTheme(name) {
  applyFontTheme(name, colorThemes, fontThemes);
  renderFontGrid();
  showToast(`✏️ ${name}`);
}

async function initPage() {
  await initPageAuth({
    onLoadLocal: (email, sheetId) => {
      currentUserEmail = email;
      spreadsheetId = sheetId;
    },
    onReady: async (sheetId, email, token) => {
      currentUserEmail = email;
      spreadsheetId = sheetId;
      document.getElementById('loadingOverlay').style.display = 'none';
      
      await loadThemesData();
      if (colorThemes.length && fontThemes.length) {
        // Set defaults if missing
        if (!localStorage.getItem('selected_color_theme')) {
          localStorage.setItem('selected_color_theme', 'Ocean Calm');
        }
        if (!localStorage.getItem('selected_font_theme')) {
          localStorage.setItem('selected_font_theme', 'Default');
        }
        renderColorGrid();
        renderFontGrid();
        
        // Ensure the combined theme is applied
        const savedColor = localStorage.getItem('selected_color_theme') || 'Ocean Calm';
        const savedFont = localStorage.getItem('selected_font_theme') || 'Default';
        const colorTheme = colorThemes.find(t => t.name === savedColor);
        const fontTheme = fontThemes.find(t => t.name === savedFont);
        if (colorTheme && fontTheme) {
          applyCombinedTheme(colorTheme.colors, fontTheme.fonts);
        }
      }
    }
  });
}

renderBottomNav('settings');
initPage();
</script>
</body>
</html>
